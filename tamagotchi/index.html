<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="device">
        <div class="device-top">
            <div class="device-logo">TAMAGOTCHI</div>
        </div>
        <div class="screen-frame">
            <div class="screen" id="screen">
                <!-- Start screen -->
                <div id="start-screen" class="screen-content">
                    <div class="egg-animation">🥚</div>
                    <p class="blink-text">Press START to hatch!</p>
                </div>

                <!-- Name screen -->
                <div id="name-screen" class="screen-content hidden">
                    <p>Name your pet:</p>
                    <input type="text" id="pet-name-input" maxlength="10" placeholder="Enter name...">
                    <button id="confirm-name-btn" class="pixel-btn">OK</button>
                </div>

                <!-- Personality reveal screen -->
                <div id="personality-screen" class="screen-content hidden">
                    <div id="personality-sprite" class="personality-hatch">🐣</div>
                    <p id="personality-name" class="personality-title"></p>
                    <p id="personality-desc" class="personality-desc"></p>
                    <p id="personality-bonus" class="personality-bonus"></p>
                    <button id="personality-ok-btn" class="pixel-btn">Let's go!</button>
                </div>

                <!-- Game screen -->
                <div id="game-screen" class="screen-content hidden">
                    <div class="status-bar">
                        <span id="pet-name-display">Pet</span>
                        <span id="trait-badge" class="trait-badge"></span>
                        <span id="stage-display">baby</span>
                        <span id="age-display">Age: 0</span>
                    </div>
                    <div class="pet-area">
                        <div id="pet-sprite" class="pet"></div>
                        <div id="reaction" class="reaction"></div>
                        <div id="poop" class="poop hidden">💩</div>
                        <div id="speech-bubble" class="speech-bubble hidden"></div>
                    </div>
                    <div class="stats" id="stats-container"></div>
                    <div id="mood-text" class="mood-text"></div>
                </div>

                <!-- Mini-game overlay -->
                <div id="minigame-overlay" class="screen-content hidden">
                    <div id="minigame-title" class="mg-title"></div>
                    <div id="minigame-area" class="mg-area"></div>
                    <div id="minigame-hud" class="mg-hud"></div>
                </div>

                <!-- Event overlay -->
                <div id="event-overlay" class="event-overlay hidden">
                    <div id="event-icon" class="event-icon"></div>
                    <p id="event-text" class="event-text"></p>
                </div>

                <!-- Death screen -->
                <div id="death-screen" class="screen-content hidden">
                    <div class="death-icon">👻</div>
                    <p id="death-message">Your pet has passed away...</p>
                    <button id="restart-btn" class="pixel-btn">Try Again</button>
                </div>
            </div>
        </div>
        <div class="buttons">
            <div class="button-row">
                <div class="btn-group">
                    <button class="device-btn" id="btn-start" title="Start">▶</button>
                    <span class="btn-label">Start</span>
                </div>
                <div class="btn-group">
                    <button class="device-btn" id="btn-feed" title="Feed" disabled>🍔</button>
                    <span class="btn-label">Feed</span>
                </div>
                <div class="btn-group">
                    <button class="device-btn" id="btn-play" title="Play" disabled>🎮</button>
                    <span class="btn-label">Play</span>
                </div>
                <div class="btn-group">
                    <button class="device-btn" id="btn-sleep" title="Sleep" disabled>💤</button>
                    <span class="btn-label">Sleep</span>
                </div>
                <div class="btn-group">
                    <button class="device-btn" id="btn-clean" title="Clean" disabled>🧹</button>
                    <span class="btn-label">Clean</span>
                </div>
                <div class="btn-group">
                    <button class="device-btn" id="btn-heal" title="Heal" disabled>💊</button>
                    <span class="btn-label">Heal</span>
                </div>
            </div>
            <div class="button-row">
                <div class="btn-group hidden" id="btn-pet-group">
                    <button class="device-btn evolution-btn" id="btn-pet" title="Pet" disabled>🤗</button>
                    <span class="btn-label">Pet</span>
                </div>
                <div class="btn-group hidden" id="btn-study-group">
                    <button class="device-btn evolution-btn" id="btn-study" title="Study" disabled>📚</button>
                    <span class="btn-label">Study</span>
                </div>
                <div class="btn-group hidden" id="btn-train-group">
                    <button class="device-btn evolution-btn" id="btn-train" title="Train" disabled>🏋️</button>
                    <span class="btn-label">Train</span>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
